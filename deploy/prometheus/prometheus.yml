global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: aegis-waf
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9100
        labels:
          service: aegis-gate
          env: dev

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
