# Aegis-Gate — Test Stack
#
# Extends the dev stack with:
#   - attacker:  container with curl + bash for manual poking and
#                corpus replay. Also has read access to tests/ and
#                the etcd bootstrap script (so red-team tests can
#                inject malicious configs directly into etcd).
#   - k6:        load testing (baseline, mixed-tiers, ddos-burst)
#   - nuclei:    template-driven vulnerability scanning
#   - etcdctl:   interactive etcd debug shell (same image as etcd,
#                kept sleeping so you can `docker exec` into it)
#
# Bring up with BOTH compose files:
#   docker compose \
#     -f deploy/docker-compose.dev.yml \
#     -f deploy/docker-compose.test.yml \
#     up -d

services:
  attacker:
    image: alpine:3.20
    container_name: aegis-attacker
    working_dir: /work
    command: ["sleep", "infinity"]
    volumes:
      - ../tests:/work:ro
      - ./etcd:/etcd-scripts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  k6:
    image: grafana/k6:0.51.0
    container_name: aegis-k6
    entrypoint: ["sleep", "infinity"]
    volumes:
      - ../tests/load:/scripts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nuclei:
    image: projectdiscovery/nuclei:v3.2.9
    container_name: aegis-nuclei
    entrypoint: ["sleep", "infinity"]
    volumes:
      - ../tests/security:/work:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Interactive etcdctl shell for debugging the control plane.
  # Usage: docker exec -it aegis-etcdctl etcdctl get /aegis/config/waf
  etcdctl:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: aegis-etcdctl
    entrypoint: ["etcdctl"]
    command: ["endpoint", "health", "--endpoints=http://etcd:2379"]
    environment:
      ETCDCTL_API: "3"
      ETCDCTL_ENDPOINTS: "http://etcd:2379"
